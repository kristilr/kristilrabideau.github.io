<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio R–M — Kristil Rabideau</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #FFB3DA;
  --accent-light: #fff0f7;
  --ink: #2a2a2a;
  --muted: #666666;
  --rule: #e8e8e8;
}
html, body { min-height: 100%; }
body { background: #fff; color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-weight: 300; }
.page { max-width: 780px; margin: 0 auto; padding: 7rem 2.5rem 8rem; }
.cs-num { font-size: 0.76rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; display: block; }
.cs-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 400; letter-spacing: 0.04em; line-height: 0.95; margin-bottom: 1.5rem; }
.cs-title em { font-style: italic; color: var(--accent); }
.cs-meta { font-size: 0.84rem; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); line-height: 2; }
.cs-header { margin-bottom: 5rem; }

.pub-label { font-size: 0.5rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; display: block; }
.pub-label.light { color: rgba(255,255,255,0.5); }
.pub-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 400; line-height: 1.3; color: var(--ink); }
.pub-title.light { color: #ffffff; }
.pub-outlet { font-size: 0.84rem; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 1.25rem; }
.pub-outlet.light { color: rgba(255,255,255,0.5); }
.image-caption a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

.cs-intro { font-size: 1.15rem; font-weight: 300; line-height: 1.9; color: var(--ink); max-width: 560px; margin-bottom: 4rem; border-top: 1px solid var(--rule); padding-top: 2.5rem; }
.cs-intro .a { font-style: italic; }
.role-strip { display: flex; border: 1px solid var(--rule); margin-bottom: 4rem; }
.role-item { flex: 1; padding: 1.25rem 1.5rem; border-right: 1px solid var(--rule); }
.role-item:last-child { border-right: none; }
.role-label { font-size: 0.5rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 0.35rem; }
.role-val { font-size: 0.94rem; font-weight: 300; letter-spacing: 0.04em; color: var(--ink); line-height: 1.6; }
.wins { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); margin-bottom: 4rem; }
.win-cell { background: #fff; padding: 2.5rem 2rem; transition: background 0.2s; }
.win-cell:hover { background: var(--accent-light); }
.win-label { font-size: 0.62rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; display: block; }
.win-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 0.6rem; }
.win-desc { font-size: 0.88rem; font-weight: 300; line-height: 1.75; color: var(--muted); }
.pullquote { border-left: 2px solid var(--accent); padding-left: 2rem; margin-bottom: 4rem; }
.pullquote p { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-style: italic; line-height: 1.65; color: var(--ink); }
.pullquote cite { display: block; margin-top: 0.75rem; font-size: 0.62rem; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-style: normal; }


.pub-credits { border-top: 1px solid var(--rule); padding-top: 1.5rem; margin-top: 0; font-size: 0.84rem; font-weight: 300; color: var(--muted); line-height: 1.8; }
.pub-credits-label { font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 0.5rem; }
