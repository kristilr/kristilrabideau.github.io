<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristil Rabideau</title>
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Roboto:wght@100;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #FFB3DA;
  --ink: #111111;
  --muted: #999999;
}
html, body { height: 100%; }
body {
  background: #fff;
  color: var(--ink);
  font-family: 'Roboto', sans-serif;
  font-weight: 100;
  height: 100%;
  overflow: hidden;
}

/* CORNERS */
.corner {
  position: fixed;
  font-size: 0.55rem;
  font-weight: 100;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  line-height: 1.9;
}
.corner-tl { top: 1.75rem; left: 2.5rem; color: var(--ink); }
.corner-tr {
  top: 1.75rem; right: 2.5rem;
  text-align: right;
  color: var(--pink);
}
.corner-bl {
  bottom: 1.75rem; left: 2.5rem;
}
.corner-br {
  bottom: 1.75rem; right: 2.5rem;
}
.corner a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-color: var(--ink);
  text-underline-offset: 3px;
  cursor: pointer;
  transition: color 0.2s;
}
.corner a:hover { color: var(--pink); text-decoration-color: var(--pink); }

/* CENTER CONTENT */
.center {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.hero-name {
  font-family: 'GFS Didot', serif;
  font-size: clamp(1.4rem, 2.4vw, 2rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
  white-space: nowrap;
}

.hero-dash {
  font-family: 'GFS Didot', serif;
  font-size: clamp(1.4rem, 2.4vw, 2rem);
  font-weight: 100;
  color: var(--ink);
  flex-shrink: 0;
  margin: 0 -0.5rem;
}

.hero-text {
  font-size: 0.78rem;
  font-weight: 100;
  line-height: 1.9;
  color: var(--ink);
  text-align: justify;
  max-width: 185px;
  white-space: normal;
}

.hero-text .pink {
  color: var(--pink);
}
</style>
</head>
<body>

<!-- TOP LEFT -->
<div class="corner corner-tl">
  Digital Marketing //<br>
  Content // Growth
</div>

<!-- TOP RIGHT -->
<div class="corner corner-tr">
  Data-Driven Results ·<br>
  +<br>
  Real Numbers ·
</div>

<!-- CENTER -->
<div class="center">
  <span class="hero-name">kristil rabideau</span>
  <span class="hero-dash"> —</span>
  <div class="hero-text">
    I immerse myself in current trends to <span class="pink">constantly improve</span> digital marketing technique and provide <span class="pink">data-driven results.</span>
  </div>
</div>

<!-- BOTTOM LEFT -->
<div class="corner corner-bl">
  <a href="case-studies.html">Case Studies</a>
</div>

<!-- BOTTOM RIGHT -->
<div class="corner corner-br">
  <a href="about.html">About Me</a>
</div>

</body>
</html>
